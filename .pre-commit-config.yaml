repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix]
      - id: ruff
        name: ruff-import-sort
        args: [--select, I, --fix]
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        args: [--explicit-package-bases, --package-root=src, --disable-error-code=import-not-found]
