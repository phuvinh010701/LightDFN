model:
  sr: 48000
  fft_size: 960
  hop_size: 480
  nb_erb: 32
  nb_df: 96
  norm_tau: 1.0
  lsnr_max: 35
  lsnr_min: -15
  min_nb_freqs: 2
  df_order: 5
  df_lookahead: 2
  pad_mode: "output"
  conv_lookahead: 2
  conv_ch: 64
  conv_depthwise: true
  convt_depthwise: false
  conv_kernel: [1, 3]
  convt_kernel: [1, 3]
  conv_kernel_inp: [3, 3]
  emb_hidden_dim: 256
  emb_num_layers: 3
  emb_gru_skip: "none"
  emb_gru_skip_enc: "none"
  df_hidden_dim: 256
  df_num_layers: 2
  df_gru_skip: "groupedlinear"
  df_pathway_kernel_size_t: 5
  lin_groups: 16
  enc_lin_groups: 32
  enc_concat: false
  df_n_iter: 1
  mask_pf: false
  pf_beta: 0.02
  lsnr_dropout: false
  batch_size: 1

augmentation:
  p_remove_dc: 0.25
  p_lfilt: 0.30
  p_biquad: 0.30
  p_resample: 0.20
  p_noise_clipping: 0.15
  p_noise_biquad: 0.40
  p_reverb: 0.1
  p_reverb_drr: 0.3
  p_bandwidth_ext: 0.0
  p_clipping: 0.0
  p_air_absorption: 0.0
  p_zeroing: 0.0
  p_interfer_sp: 0.0

data_loader:
  speech_hdf5: ["datasets/hdf5/speech_clean.hdf5"]
  noise_hdf5: ["datasets/hdf5/noise_music.hdf5"]
  rir_hdf5: ["datasets/hdf5/rir.hdf5"]
  sr: 48000
  fft_size: 960
  hop_size: 480
  nb_erb: 32
  nb_spec: 96
  min_nb_freqs: 2
  norm_tau: 1.0
  max_len_s: 3.0
  batch_size: 32
  batch_size_eval: 32
  num_workers: 8
  num_prefetch_batches: 8
  seed: 43
  dataloader_snrs: [-100, -5, 0, 5, 10, 20, 40]
  global_ds_sampling_f: 1.0

train:
  epochs: 120
  log_every_n_steps: 100
  val_every_n_epochs: 1
  early_stopping_patience: 25
  max_nans: 50
  p_atten_lim: 0.0
  checkpoint_dir: "checkpoints"
  wandb_project: "lightdfn"
  optimizer: "adamw"
  lr: 1.0e-3
  lr_warmup: 1.0e-4
  lr_min: 1.0e-6
  warmup_epochs: 3
  weight_decay: 1.0e-12
  weight_decay_end: 0.01
  adam_betas: [0.9, 0.999]
  amsgrad: true
  grad_clip: 1.0

loss:
  lsnr_factor: 1.0e-3
  ml_factor: 1.0
  ml_mask: "iam"
  ml_gamma: 0.3
  ml_gamma_pred: 0.3
  ml_f_under: 1.0
  ml_powers: [2, 4]
  ml_factors: [1.0, 10.0]
  sl_factor_magnitude: 0.0
  sl_factor_complex: 0.0
  sl_factor_under: 1.0
  sl_gamma: 0.3
  mrsl_factor: 500.0
  mrsl_factor_complex: 500.0
  mrsl_gamma: 0.3
  mrsl_fft_sizes: [256, 512, 1024, 2048]
  sdr_factor: 0.0
  sdr_segmental_ws: []
